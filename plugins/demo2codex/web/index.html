<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <meta name="referrer" content="no-referrer" />
    <title>Demo2Codex</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">D2C</span>
          <span>Demo2Codex</span>
        </div>
        <span id="connectionBadge" class="badge" data-state="neutral">
          <span class="status-dot" aria-hidden="true"></span>
          <span>连接中</span>
        </span>
      </header>

      <section class="card recorder-card" aria-labelledby="recorderTitle">
        <header class="card-header">
          <div>
            <h1 id="recorderTitle">录音</h1>
            <p id="sessionLabel" class="muted">读取会话中…</p>
          </div>
          <span id="recordingState" class="badge" data-state="idle">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="recordingStateText">准备就绪</span>
          </span>
        </header>

        <div class="recorder-body">
          <time id="timer" datetime="PT0S" aria-label="录音时长">00:00:00</time>
          <div
            class="level-track"
            role="meter"
            aria-label="麦克风音量"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
          >
            <span id="levelBar" class="level-bar"></span>
          </div>
        </div>

        <div class="controls" aria-label="录音控制">
          <button id="startButton" class="button button-default" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="5"></circle></svg>
            开始
          </button>
          <button id="pauseButton" class="button button-outline" type="button" disabled>
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14M16 5v14"></path></svg>
            <span id="pauseButtonText">暂停</span>
          </button>
          <button id="finishButton" class="button button-destructive" type="button" disabled>
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="7" y="7" width="10" height="10" rx="1"></rect></svg>
            结束
          </button>
        </div>
      </section>

      <details class="card transcript-card">
        <summary class="card-summary">
          <span>逐字稿</span>
          <span class="summary-meta">
            <span id="transcriptCountLabel">0 条</span>
            <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6"></path></svg>
          </span>
        </summary>

        <div class="transcript-content">
          <label class="switch-row" for="speechToggle">
            <span>
              <strong>实时转写</strong>
              <small id="speechSupportText"></small>
            </span>
            <input id="speechToggle" type="checkbox" role="switch" checked />
            <span class="switch" aria-hidden="true"></span>
          </label>

          <div id="transcriptList" class="transcript-list" aria-live="polite" aria-label="逐字稿">
            <div id="emptyTranscript" class="empty-state">暂无内容</div>
          </div>

          <div id="interimTranscript" class="interim-transcript" hidden>
            <span class="status-dot" aria-hidden="true"></span>
            <span id="interimText"></span>
          </div>
        </div>
      </details>

      <div id="focusSummary" class="sr-only" aria-live="polite">
        <span></span>
        <span>当前为全局评审记录</span>
      </div>

      <section id="resultCard" class="card result-card" aria-labelledby="resultTitle" hidden>
        <header class="card-header">
          <h2 id="resultTitle">会后结果</h2>
          <span id="resultStatus" class="badge" data-state="waiting">等待生成</span>
        </header>

        <div id="resultWaiting" class="empty-state">正在生成…</div>

        <form id="resultForm" hidden>
          <textarea id="reviewSummary" class="textarea summary-input" rows="4" aria-label="会议总结" placeholder="会议总结"></textarea>

          <div class="section-toolbar">
            <h3>TODO</h3>
            <button id="addTodoButton" class="button button-ghost button-icon" type="button" aria-label="添加 TODO">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"></path></svg>
            </button>
          </div>

          <div id="todoList" class="todo-list"></div>

          <div class="result-actions">
            <span id="resultSavedAt" class="muted"></span>
            <button class="button button-default" type="submit">保存</button>
          </div>
        </form>
      </section>

      <footer class="footer">
        <span id="backupStatus">本地备份准备中…</span>
      </footer>
    </main>

    <div id="toastRegion" class="toast-region" aria-live="assertive" aria-atomic="true"></div>

    <dialog id="finishDialog" class="dialog">
      <form method="dialog">
        <div id="finishSpinner" class="spinner" aria-hidden="true"></div>
        <h2 id="finishDialogTitle">正在整理</h2>
        <p id="finishDialogText">正在保存录音…</p>
        <button id="closeDialogButton" class="button button-default" value="close" hidden>完成</button>
      </form>
    </dialog>

    <script type="module" src="./app.js"></script>
  </body>
</html>
